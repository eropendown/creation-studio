server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由：所有路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 缓存带哈希的静态资源（Vite 构建产物）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
